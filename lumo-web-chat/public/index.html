<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumo Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <style>
      :root {
        --bg: #0c0c0d;
        --sidebar: #111113;
        --sidebar-border: #1c1c1f;
        --text: #e4e4e7;
        --muted: #8b8b8e;
        --accent: #ff6b35;
        --hover: #1a1a1f;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 13px;
      }
      .app { display: flex; height: 100vh; overflow: hidden; }
      .sidebar {
        width: 280px; background: var(--sidebar); border-right: 1px solid var(--sidebar-border);
        display: flex; flex-direction: column; transition: transform 200ms ease;
      }
      .side-header { padding: 14px 12px; display:flex; justify-content:space-between; align-items:center; }
      .brand { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
      .icon-btn, .danger-btn {
        border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 8px;
        transition: all 120ms ease; font-family: inherit;
      }
      .icon-btn { width: 30px; height: 30px; font-size: 18px; }
      .icon-btn:hover, .danger-btn:hover { background: var(--hover); color: var(--text); }
      .icon-btn:active, .danger-btn:active { transform: scale(0.97); }
      .mode-wrap { margin: 0 12px 8px; padding: 8px 10px; border: 1px solid #222226; border-radius: 10px; background: #121215; display:flex; justify-content:space-between; align-items:center; }
      .switch { position: relative; width: 34px; height: 20px; background:#25252a; border-radius: 999px; cursor:pointer; transition: 120ms ease; }
      .switch::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#9a9aa0; transition:120ms ease; }
      .switch.active { background: rgba(255,107,53,0.24); }
      .switch.active::after { left:16px; background: var(--accent); }
      .session-list {
        flex:1; overflow:auto; padding: 4px 8px 10px;
        scrollbar-width: thin; scrollbar-color: #2a2a30 transparent;
      }
      .session-item {
        position:relative; display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:8px;
        margin-bottom: 1px; cursor:pointer; transition: 120ms ease;
      }
      .session-item:hover { background:#16161a; }
      .session-item.active { background:#1a1a20; }
      .session-item.active::before {
        content:''; position:absolute; left:4px; width:6px; height:6px; border-radius:50%; background: var(--accent);
      }
      .chat-ico { color:#555; }
      .session-meta { overflow:hidden; flex:1; }
      .session-name { font-size:13px; white-space:nowrap; text-overflow:ellipsis; overflow:hidden; }
      .session-date { color:#555; font-size:11px; margin-top:2px; }
      .menu-btn { opacity:0; transition:120ms ease; }
      .session-item:hover .menu-btn { opacity:1; }
      .side-footer { border-top:1px solid #1c1c1f; padding:10px; }
      .danger-btn { width:100%; padding:8px 10px; text-align:left; font-size:12px; }

      .main { flex:1; display:flex; flex-direction:column; background: var(--bg); }
      .topbar { display:none; height:52px; border-bottom:1px solid #1a1a1f; padding:10px; align-items:center; gap:10px; }
      .chat-scroll { flex:1; overflow:auto; padding: 28px min(9vw, 100px) 120px; scroll-behavior:smooth; }
      .welcome h1 { margin: 0 0 8px; font-size: 32px; font-weight: 600; letter-spacing: -0.01em; }
      .welcome p { margin:0 0 20px; color: var(--muted); font-size:15px; }
      .suggestions { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; max-width: 760px; }
      .suggestion { border:1px solid #1e1e24; border-radius:12px; padding:16px; background:transparent; color:var(--text); text-align:left; cursor:pointer; transition:120ms ease; }
      .suggestion:hover { border-color:#2a2a33; background:#111114; }

      .msg { font-size:15px; line-height:1.65; animation: rise 300ms ease-out; }
      @keyframes rise { from { opacity:.2; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }
      .msg.user-wrap { display:flex; justify-content:flex-end; margin-bottom:18px; }
      .user-bubble {
        max-width:70%; background:#1e1e24; border:1px solid #2a2a33; border-radius:18px 4px 18px 18px;
        padding:14px 18px; box-shadow:0 1px 2px rgba(0,0,0,.2);
        white-space:pre-wrap;
      }
      .ai-group { margin-bottom:24px; display:flex; gap:10px; }
      .avatar {
        width:28px; height:28px; min-width:28px; border-radius:50%; background:#1a1a20; display:grid; place-items:center; color:#bdbdc2; font-weight:600;
      }
      .ai-content { padding:4px 0; max-width: 920px; width:100%; }
      .timestamp { font-size:11px; color:#555; margin-top:6px; }
      .typing { color:#555; animation:pulse 1.1s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:1} }

      .md p { margin:0 0 12px; }
      .md strong { font-weight:600; }
      .md em { font-style:italic; }
      .md code { background:#1a1a1f; padding:0 6px; border-radius:4px; font-size:.9em; font-family:'JetBrains Mono', monospace; }
      .md pre { margin:0; }
      .code-wrap { background:#0a0a0d; border:1px solid #1a1a1f; border-radius:10px; overflow:hidden; margin:12px 0 14px; }
      .code-head { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid #1a1a1f; color:#8f8f95; font-size:12px; }
      .copy-btn { border:1px solid #2a2a30; border-radius:7px; padding:4px 8px; background:transparent; color:#c4c4ca; cursor:pointer; transition:120ms ease; }
      .copy-btn:hover { background:#17171b; }
      .copy-btn:active { transform:scale(.97); }
      .code-body { padding:16px; font-family:'JetBrains Mono', monospace; font-size:13px; overflow:auto; color:#e4e4e7; }
      .kw { color:#ff6b35; } .str { color:#a5d6ff; } .com { color:#666; } .fn { color:#e4e4e7; }
      .md a { color:var(--accent); text-decoration:underline; }
      .md ul, .md ol { padding-left:20px; }
      .md li::marker { color:#555; }
      .md blockquote { margin:10px 0; border-left:2px solid #333; padding-left:14px; color:#999; }
      .md h1,.md h2,.md h3,.md h4 { margin:20px 0 8px; font-weight:600; letter-spacing:-0.01em; }

      .composer-wrap { position:sticky; bottom:0; padding: 0 min(9vw,100px) 20px; background: linear-gradient(180deg, transparent, rgba(12,12,13,.85) 35%, rgba(12,12,13,1)); }
      .composer {
        border:1px solid #222226; border-radius:14px; background:#141416; padding:10px 14px;
        transition:120ms ease;
      }
      .composer:focus-within { border-color:#ff6b3522; box-shadow:0 0 0 3px rgba(255,107,53,0.1); }
      textarea {
        width:100%; min-height:44px; max-height:200px; resize:none; border:none; outline:none;
        color:var(--text); background:transparent; font: 400 15px/1.65 Inter, sans-serif;
      }
      textarea::placeholder { color:#555; font-style:italic; }
      .composer-row { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
      .counter { font-size:11px; color:#555; min-height:13px; }
      .send-btn {
        width:32px; height:32px; border:none; border-radius:50%; background:var(--accent); color:white; cursor:pointer;
        transition:100ms ease; font-size:15px;
      }
      .send-btn:disabled { opacity:.25; cursor:not-allowed; }
      .send-btn:active { transform:scale(.94); }

      .progress { margin-top:8px; color:#777; font-size:11px; display:none; }

      @media (max-width: 767px) {
        body { font-size:14px; }
        .topbar { display:flex; }
        .sidebar { position:fixed; inset:0 auto 0 0; z-index:12; height:100%; transform: translateX(-100%); }
        .sidebar.open { transform: translateX(0); }
        .overlay { position:fixed; inset:0; background: rgba(0,0,0,.45); z-index:11; display:none; }
        .overlay.show { display:block; }
        .chat-scroll { padding: 20px 14px 114px; }
        .suggestions { grid-template-columns: 1fr; }
        .user-bubble { max-width:85%; }
        .composer-wrap { padding: 0 10px 10px; }
        textarea { font-size:14px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <div class="side-header">
          <div class="brand">Lumo</div>
          <button class="icon-btn" id="newChatBtn" title="Perbualan Baru">+</button>
        </div>
        <div class="mode-wrap">
          <div>Mod Pengekodan</div>
          <div id="codeModeToggle" class="switch" aria-label="Mod Pengekodan"></div>
        </div>
        <div class="session-list" id="sessionList"></div>
        <div class="side-footer">
          <button class="danger-btn" id="clearAllBtn">Padam Semua</button>
        </div>
      </aside>
      <div class="overlay" id="overlay"></div>
      <main class="main">
        <div class="topbar"><button class="icon-btn" id="hamburger">☰</button><strong>Lumo</strong></div>
        <section class="chat-scroll" id="chatScroll"></section>
        <div class="composer-wrap">
          <div class="composer">
            <textarea id="promptInput" placeholder="Tanya apa sahaja..."></textarea>
            <div class="composer-row">
              <div class="counter" id="counter"></div>
              <button class="send-btn" id="sendBtn" disabled>➤</button>
            </div>
            <div class="progress" id="progressText"></div>
          </div>
        </div>
      </main>
    </div>

    <script>
      const STORAGE_KEY = 'lumo_chat_data';
      const MAX_SESSIONS = 100;
      const state = {
        data: { sessions: {}, activeId: null, sidebarOpen: window.innerWidth >= 768, codingMode: false },
        isStreaming: false,
        userScrolledUp: false,
      };

      const els = {
        sidebar: document.getElementById('sidebar'),
        overlay: document.getElementById('overlay'),
        sessionList: document.getElementById('sessionList'),
        chatScroll: document.getElementById('chatScroll'),
        promptInput: document.getElementById('promptInput'),
        sendBtn: document.getElementById('sendBtn'),
        counter: document.getElementById('counter'),
        newChatBtn: document.getElementById('newChatBtn'),
        clearAllBtn: document.getElementById('clearAllBtn'),
        hamburger: document.getElementById('hamburger'),
        progressText: document.getElementById('progressText'),
        codeModeToggle: document.getElementById('codeModeToggle')
      };

      const formatTime = (iso) => new Date(iso).toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' });
      const uid = () => `s_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`;
      const escapeHtml = (str='') => str.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

      function loadFromStorage() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (parsed?.sessions) state.data = { sidebarOpen: true, codingMode: false, ...parsed };
        } catch (_) {}
        if (!state.data.activeId || !state.data.sessions[state.data.activeId]) {
          createSession('Perbualan Baru');
        }
      }

      function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }

      function createSession(name = 'Perbualan Baru') {
        const id = uid();
        const now = new Date().toISOString();
        state.data.sessions[id] = { id, name, createdAt: now, updatedAt: now, messages: [] };
        state.data.activeId = id;
        pruneSessions();
        saveToStorage();
        renderSidebar();
        renderMessages();
      }

      function deleteSession(id) {
        if (!state.data.sessions[id]) return;
        delete state.data.sessions[id];
        if (state.data.activeId === id) {
          const next = Object.keys(state.data.sessions)[0];
          if (next) state.data.activeId = next;
          else createSession('Perbualan Baru');
        }
        saveToStorage();
        renderSidebar();
        renderMessages();
      }

      function renameSession(id, name) {
        if (!state.data.sessions[id] || !name?.trim()) return;
        state.data.sessions[id].name = name.trim();
        state.data.sessions[id].updatedAt = new Date().toISOString();
        saveToStorage();
        renderSidebar();
      }

      function switchSession(id) {
        if (!state.data.sessions[id]) return;
        state.data.activeId = id;
        saveToStorage();
        renderSidebar();
        renderMessages();
        closeSidebarMobile();
      }

      function getActiveSession() { return state.data.sessions[state.data.activeId]; }
      function getMessages() { return getActiveSession()?.messages ?? []; }

      function addMessage(role, content) {
        const s = getActiveSession();
        if (!s) return;
        const msg = { role, content, timestamp: new Date().toISOString() };
        s.messages.push(msg);
        s.updatedAt = msg.timestamp;
        return msg;
      }

      function exportSession(id) {
        const session = state.data.sessions[id];
        if (!session) return;
        const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${session.name.replace(/\s+/g, '_')}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function importSession(jsonFile) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const session = JSON.parse(reader.result);
            if (!session?.messages) return;
            const id = uid();
            state.data.sessions[id] = { ...session, id, updatedAt: new Date().toISOString() };
            state.data.activeId = id;
            pruneSessions();
            saveToStorage();
            renderSidebar();
            renderMessages();
          } catch (_) {}
        };
        reader.readAsText(jsonFile);
      }

      function clearAll() {
        state.data.sessions = {};
        state.data.activeId = null;
        createSession('Perbualan Baru');
      }

      function pruneSessions() {
        const ids = Object.values(state.data.sessions)
          .sort((a,b) => new Date(a.updatedAt) - new Date(b.updatedAt))
          .map(s => s.id);
        while (ids.length > MAX_SESSIONS) {
          const oldest = ids.shift();
          if (oldest !== state.data.activeId) delete state.data.sessions[oldest];
        }
      }

      function syntaxHighlight(code) {
        return escapeHtml(code)
          .replace(/\/\/.*$/gm, '<span class="com">$&</span>')
          .replace(/(".*?"|'.*?'|`[\s\S]*?`)/g, '<span class="str">$1</span>')
          .replace(/\b(function|const|let|var|return|if|else|for|while|class|async|await|import|from|export|new|try|catch)\b/g, '<span class="kw">$1</span>')
          .replace(/\b([a-zA-Z_$][\w$]*)(?=\()/g, '<span class="fn">$1</span>');
      }

      marked.setOptions({ breaks: true, gfm: true });
      const renderer = new marked.Renderer();
      renderer.code = (code, infostring = '') => {
        const lang = (infostring || 'kod').trim();
        const highlighted = syntaxHighlight(code);
        return `<div class="code-wrap"><div class="code-head"><span>${escapeHtml(lang)}</span><button class="copy-btn" data-copy="${encodeURIComponent(code)}">Salin</button></div><pre class="code-body"><code>${highlighted}</code></pre></div>`;
      };

      function renderSidebar() {
        const sessions = Object.values(state.data.sessions).sort((a,b) => new Date(b.updatedAt)-new Date(a.updatedAt));
        if (!sessions.length) {
          els.sessionList.innerHTML = `<div style="padding:12px;color:#666">Tiada perbualan lagi</div>`;
          return;
        }

        els.sessionList.innerHTML = sessions.map(s => `
          <div class="session-item ${s.id===state.data.activeId?'active':''}" data-id="${s.id}">
            <span class="chat-ico">◦</span>
            <div class="session-meta">
              <div class="session-name">${escapeHtml(s.name)}</div>
              <div class="session-date">${new Date(s.updatedAt).toLocaleDateString('ms-MY')}</div>
            </div>
            <button class="icon-btn menu-btn" data-menu="${s.id}">⋯</button>
          </div>
        `).join('');
      }

      function renderMessages() {
        const messages = getMessages();
        if (!messages.length) {
          els.chatScroll.innerHTML = `
            <div class="welcome">
              <h1>👋 Selamat Datang</h1>
              <p>Lumo sedia membantu. Tanya apa sahaja.</p>
              <div class="suggestions">
                <button class="suggestion" data-suggest="Terangkan konsep API dalam bahasa mudah.">🔎 Terangkan API mudah</button>
                <button class="suggestion" data-suggest="Bantu saya rancang jadual kerja 7 hari.">🗓️ Pelan mingguan</button>
                <button class="suggestion" data-suggest="Tulis fungsi JavaScript untuk validasi borang.">💻 Bina fungsi JavaScript</button>
                <button class="suggestion" data-suggest="Ringkaskan artikel panjang kepada poin penting.">🧠 Ringkasan pintar</button>
              </div>
            </div>`;
          return;
        }

        let html = '';
        let aiGroupOpen = false;
        messages.forEach((m, i) => {
          const next = messages[i+1];
          if (m.role === 'user') {
            if (aiGroupOpen) {
              html += '</div></div>';
              aiGroupOpen = false;
            }
            html += `<div class="msg user-wrap"><div class="user-bubble">${escapeHtml(m.content)}</div></div><div class="timestamp" style="text-align:right;margin-bottom:16px">${formatTime(m.timestamp)}</div>`;
          } else {
            const firstInGroup = !aiGroupOpen;
            if (firstInGroup) html += `<div class="msg ai-group"><div class="avatar">L</div><div class="ai-content">`;
            const parsed = DOMPurify.sanitize(marked.parse(m.content, { renderer }));
            html += `<div class="md">${parsed}</div><div class="timestamp">${formatTime(m.timestamp)}</div>`;
            if (!next || next.role === 'user') {
              html += '</div></div>';
              aiGroupOpen = false;
            } else {
              aiGroupOpen = true;
            }
          }
        });

        els.chatScroll.innerHTML = html;
        bindCopyButtons();
        maybeAutoScroll();
      }

      function bindCopyButtons() {
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.onclick = async () => {
            const raw = decodeURIComponent(btn.dataset.copy || '');
            await navigator.clipboard.writeText(raw).catch(() => {});
            const old = btn.textContent;
            btn.textContent = 'Disalin!';
            setTimeout(() => (btn.textContent = old), 2000);
          };
        });
      }

      function maybeAutoScroll(force = false) {
        if (force || !state.userScrolledUp) {
          els.chatScroll.scrollTop = els.chatScroll.scrollHeight;
        }
      }

      function setStreamingUI(active, text='') {
        state.isStreaming = active;
        els.sendBtn.disabled = active || !els.promptInput.value.trim();
        els.progressText.style.display = active ? 'block' : 'none';
        els.progressText.textContent = text;
      }

      async function sendMessage() {
        const raw = els.promptInput.value.trim();
        if (!raw || state.isStreaming) return;

        let message = raw;
        if (state.data.codingMode) {
          message = `Anda dalam Mod Pengekodan. Buat output kod yang boleh terus disalin. Wajib analisis 2 kali (Analisis 1 dan Analisis 2), semak bug, dan hanya beri kod final jika stabil. Sertakan langkah progress ringkas dan bahagian preview hasil.\n\nPermintaan pengguna:\n${raw}`;
        }

        addMessage('user', raw);
        renderMessages();
        els.promptInput.value = '';
        resizeInput();
        updateCounter();

        const assistant = addMessage('assistant', '');
        renderMessages();
        setStreamingUI(true, state.data.codingMode ? 'Lumo menaip... • Analisis 1/2' : 'Lumo menaip...');

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });

          if (!response.ok || !response.body) throw new Error('Ralat sambungan');

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let done = false;

          while (!done) {
            const { value, done: rdDone } = await reader.read();
            done = rdDone;
            buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
            const chunks = buffer.split('\n\n');
            buffer = chunks.pop() || '';

            for (const chunk of chunks) {
              const line = chunk.split('\n').find(l => l.startsWith('data:'));
              if (!line) continue;
              const payload = JSON.parse(line.replace(/^data:\s*/, ''));
              if (payload.token) {
                assistant.content += payload.token;
                renderMessages();
                if (state.data.codingMode && assistant.content.length > 220) {
                  setStreamingUI(true, 'Lumo menaip... • Analisis 2/2');
                }
              }
              if (payload.error) throw new Error(payload.error);
              if (payload.done) done = true;
            }
          }

          getActiveSession().updatedAt = new Date().toISOString();
          saveToStorage();
        } catch (e) {
          assistant.content = `${assistant.content ? assistant.content + '\n\n' : ''}**Ralat sambungan**`;
          renderMessages();
        } finally {
          setStreamingUI(false);
          maybeAutoScroll(true);
        }
      }

      function updateCounter() {
        const len = els.promptInput.value.length;
        els.counter.textContent = len > 3000 ? `${len} aksara` : '';
        els.sendBtn.disabled = !els.promptInput.value.trim() || state.isStreaming;
      }

      function resizeInput() {
        els.promptInput.style.height = 'auto';
        els.promptInput.style.height = Math.min(els.promptInput.scrollHeight, 200) + 'px';
      }

      function openSidebarMobile() {
        if (window.innerWidth >= 768) return;
        state.data.sidebarOpen = true;
        els.sidebar.classList.add('open');
        els.overlay.classList.add('show');
        saveToStorage();
      }
      function closeSidebarMobile() {
        if (window.innerWidth >= 768) return;
        state.data.sidebarOpen = false;
        els.sidebar.classList.remove('open');
        els.overlay.classList.remove('show');
        saveToStorage();
      }

      els.newChatBtn.onclick = () => createSession('Perbualan Baru');
      els.clearAllBtn.onclick = () => clearAll();
      els.hamburger.onclick = openSidebarMobile;
      els.overlay.onclick = closeSidebarMobile;
      els.sendBtn.onclick = sendMessage;
      els.promptInput.addEventListener('input', () => { updateCounter(); resizeInput(); });
      els.promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      els.chatScroll.addEventListener('scroll', () => {
        const distance = els.chatScroll.scrollHeight - els.chatScroll.scrollTop - els.chatScroll.clientHeight;
        state.userScrolledUp = distance > 120;
      });

      document.addEventListener('click', (e) => {
        const sid = e.target.closest('.session-item')?.dataset.id;
        if (sid) switchSession(sid);

        const menu = e.target.closest('[data-menu]')?.dataset.menu;
        if (menu) {
          e.stopPropagation();
          const choice = prompt('Taip: rename / delete / export / import');
          if (choice === 'rename') {
            const n = prompt('Nama baharu:');
            if (n) renameSession(menu, n);
          }
          if (choice === 'delete') deleteSession(menu);
          if (choice === 'export') exportSession(menu);
          if (choice === 'import') {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = 'application/json';
            inp.onchange = () => inp.files?.[0] && importSession(inp.files[0]);
            inp.click();
          }
        }

        const suggest = e.target.closest('[data-suggest]')?.dataset.suggest;
        if (suggest) {
          els.promptInput.value = suggest;
          updateCounter();
          resizeInput();
          els.promptInput.focus();
        }
      });

      document.addEventListener('keydown', (e) => {
        const mod = e.ctrlKey || e.metaKey;
        if (mod && e.key.toLowerCase() === 'k') { e.preventDefault(); els.promptInput.focus(); }
        if (mod && e.key.toLowerCase() === 'n') { e.preventDefault(); createSession('Perbualan Baru'); }
        if (mod && e.key.toLowerCase() === 'b') {
          e.preventDefault();
          if (window.innerWidth < 768) {
            state.data.sidebarOpen ? closeSidebarMobile() : openSidebarMobile();
          } else {
            state.data.sidebarOpen = !state.data.sidebarOpen;
            els.sidebar.style.transform = state.data.sidebarOpen ? 'translateX(0)' : 'translateX(-100%)';
            saveToStorage();
          }
        }
        if (e.key === 'Escape') {
          els.promptInput.blur();
          closeSidebarMobile();
        }
      });

      els.codeModeToggle.onclick = () => {
        state.data.codingMode = !state.data.codingMode;
        els.codeModeToggle.classList.toggle('active', state.data.codingMode);
        saveToStorage();
      };

      (async function init() {
        loadFromStorage();
        els.codeModeToggle.classList.toggle('active', !!state.data.codingMode);
        renderSidebar();
        renderMessages();

        if (window.innerWidth < 768 && state.data.sidebarOpen) openSidebarMobile();

        try {
          await fetch('/api/health');
        } catch (_) {}
      })();
    </script>
  </body>
</html>
